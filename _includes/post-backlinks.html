{%- if page.backlinks.size > 0 -%}
  <section class="post-backlinks" aria-labelledby="post-backlinks-heading">
    <h2 class="post-backlinks__title" id="post-backlinks-heading">Referenced in</h2>
    <ul class="post-backlinks__list" role="list">
      {%- for bl in page.backlinks -%}
        <li>
          <a href="{{ bl.url | relative_url }}" title="{{ bl.title | escape }}">{{ bl.title }}</a>
          <time datetime="{{ bl.date | date_to_xmlschema }}">{{ bl.date | date: '%d %b %Y' }}</time>
        </li>
      {%- endfor -%}
    </ul>
  </section>
{%- endif -%}
