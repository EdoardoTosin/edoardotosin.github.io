---
layout: default
---
{%- if page.title -%}
  <div class="page-hero">
    <div class="container">
      <h1 class="page-hero__title">{{ page.title }}</h1>
      {%- if page.description -%}
        <p class="page-hero__desc">{{ page.description }}</p>
      {%- endif -%}
    </div>
  </div>
{%- endif -%}

<div class="container">
  <div class="page-content post-content">
    {{ content }}
  </div>
</div>
