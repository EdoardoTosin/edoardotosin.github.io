{%- if site.webmentions.enabled -%}
<section class="webmentions" id="webmentions" aria-label="Webmentions and reactions">
  <h2 class="webmentions__title">Reactions</h2>
  <div class="webmentions__likes" id="wm-likes" hidden>
    <p class="webmentions__likes-label" id="wm-likes-label"></p>
    <div class="webmentions__avatars" id="wm-avatars" aria-label="People who liked or reposted this"></div>
  </div>
  <div class="webmentions__replies" id="wm-replies" aria-label="Replies and mentions" aria-live="polite">
    <p class="webmentions__loading">Loading reactions&hellip;</p>
  </div>
</section>
{%- endif -%}
