# Site identity
title:         "Edoardo Tosin"
description:   "Personal blog on software development, cybersecurity, and open-source systems."
keywords:      "self-hosting, dns, security, cybersecurity, linux, open source, programming, bug bounty, computer science, astrophotography"
url:           "https://edoardotosin.com"
baseurl:       ""
lang:          "en"
og_locale:     "en_US"    # Open Graph locale (og:locale). Format: language_TERRITORY
timezone:      "Europe/Rome"
repository:    "https://github.com/EdoardoTosin/edoardotosin.github.io"
logo:          "/favicon.png"

# Author
author:
  name:              "Edoardo Tosin"
  bio:               "Focused on software development, security exploration, and open-source projects, with hands-on experience in Linux environments."
  tagline:           "Software · Security · Open Source"
  hero_title:        "Hi, I'm Edoardo"
  hero_subtitle:     "Software & Security"
  hero_description:  "I build and explore software, documenting practical work in programming, security, Linux, and open-source projects, with the occasional telescope pointed at something far away."
  avatar:            "/images/avatar.jpg"
  email:             "edoardotosindev@proton.me"
  twitter:           "edoardotosin" # Used for jekyll-feed author information

