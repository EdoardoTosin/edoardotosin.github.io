{%- if site.webmentions.enabled -%}
  <section class="webmentions" id="webmentions" aria-label="Webmentions and reactions">
    <h2 class="webmentions__title">Reactions</h2>
    <div class="webmentions__likes" id="webmentions-likes" hidden>
      <p class="webmentions__likes-label" id="webmentions-likes-label"></p>
      <div class="webmentions__avatars" id="webmentions-avatars" aria-label="People who liked or reposted this"></div>
    </div>
    <div class="webmentions__replies" id="webmentions-replies" aria-label="Replies and mentions" aria-live="polite">
      <p class="webmentions__loading">Loading reactions…</p>
    </div>
  </section>
{%- endif -%}
