{%- assign _post = include.post -%}

<article class="post-card" itemscope itemtype="http://schema.org/BlogPosting">
  <a href="{{ _post.url | relative_url }}" class="post-card__img" aria-hidden="true" tabindex="-1">
    <img
      src="{{ _post.image | default: '/images/social-preview.jpg' | relative_url }}"
      alt=""
      loading="lazy"
      width="720"
      height="405"
      itemprop="image"
    >
  </a>

  <div class="post-card__body">
    {%- if _post.topic and _post.topic != '' -%}
      <a
        href="{{ '/topics/?topic=' | append: _post.topic | relative_url }}"
        class="post-card__tag"
        data-topic="{{ _post.topic | downcase | escape }}"
        rel="tag"
      >
        {{- _post.topic | downcase | escape -}}
      </a>
    {%- endif -%}

    <h2 class="post-card__title" itemprop="headline">
      <a href="{{ _post.url | relative_url }}" itemprop="url" title="{{ _post.title | escape }}">
        {{- _post.title | escape -}}
      </a>
    </h2>

    <p class="post-card__description" itemprop="description">
      {{ _post.description | truncate: 160 | escape }}
    </p>

    <div class="post-card__meta">
      <span class="meta-item">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>
        </svg>
        <time datetime="{{ _post.date | date_to_xmlschema }}" itemprop="datePublished">
          {{ _post.date | date: '%d %b %Y' }}
        </time>
      </span>
      <span class="meta-item">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
        </svg>
        {{ _post.content | reading_time }}
      </span>
    </div>
  </div>
</article>
