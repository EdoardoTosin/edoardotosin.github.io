<div class="search-overlay"
     id="search-overlay"
     role="dialog"
     aria-modal="true"
     aria-label="Search posts">
  <div class="search-overlay__box">
    <div class="search-overlay__input-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="search"
             id="search-input"
             class="search-overlay__input"
             placeholder="Search posts&#x2026; try topic:linux after:2024 or is:featured"
             autocomplete="off"
             spellcheck="false"
             aria-label="Search posts"
             aria-autocomplete="list"
             aria-controls="search-results">
      <button id="search-close"
              class="search-overlay__close"
              aria-label="Close search">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="search-overlay__results"
         id="search-results"
         role="listbox"
         aria-label="Search results"
         aria-live="polite"></div>
    <div class="search-overlay__shortcuts" aria-hidden="true">
      <span><kbd class="search-kbd">"phrase"</kbd> exact</span>
      <span><kbd class="search-kbd">-word</kbd> exclude</span>
      <span><kbd class="search-kbd">topic:</kbd></span>
      <span><kbd class="search-kbd">tag:</kbd></span>
      <span><kbd class="search-kbd">after:2024</kbd></span>
      <span><kbd class="search-kbd">before:2024</kbd></span>
      <span><kbd class="search-kbd">is:featured</kbd></span>
      <span><kbd class="search-kbd">intitle:</kbd></span>
      <span><kbd class="search-kbd">inurl:</kbd></span>
      <span><kbd class="search-kbd">words:&gt;500</kbd></span>
      <span><kbd class="search-kbd">time:&gt;5</kbd></span>
      <span><kbd class="search-kbd">A OR B</kbd></span>
      <span><kbd class="search-kbd">↓↑</kbd> select</span>
      <span><kbd class="search-kbd">↵</kbd> open</span>
      <span><kbd class="search-kbd">Esc</kbd> close</span>
    </div>
  </div>
</div>
