# Content defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout:   "post"
      image:    "/images/social-preview.jpg"
      comments: true
      share:    true
      featured: false
      video:    false
      gallery:  false
  - scope:
      path: "pages"
    values:
      layout: "page"

# Homepage sections
homepage:
  enable_blog_toggle: true   # grid/list toggle on the blog feed
  sticky_sidebar:     true
  posts_per_page:     4

  featured_source: "front_matter"
  featured_limit:  3

  topics_limit: 6

  show_topic_clusters: true

  video_source: "front_matter"
  videos_limit: 3

  gallery_source: "front_matter"
  gallery_limit:  5

# Integrations
newsletter:
  enabled:      false
  action_url:   "https://your-mailchimp-list-url"
  title:        "Subscribe"
  description:  "Get the latest posts, videos, and updates delivered straight to your inbox."
  button_text:  "Join Now"

disqus:
  enabled:   false
  shortname: "your-disqus-shortname"

google_analytics: ""

url_shortener: ""

# Build
markdown:    kramdown
highlighter: rouge
permalink:   "/blog/:title"

kramdown:
  input: GFM
  smart_quotes: ["apos", "apos", "quot", "quot"]
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate-v2

pagination:
  enabled:      true
  per_page:     6
  permalink:    "/_pagination/homepage/:num/"
  title:        ":title - page :num"
  sort_field:   "date"
  sort_reverse: true

feed:
  path: feed.xml
  posts_limit: 50
  icon: /images/avatar.jpg
  logo: /images/social-preview.png

sass:
  sass_dir: _sass
  style: compressed
  quiet_deps: true
  silence_deprecations: [legacy-js-api]

include:
  - ".well-known/security.txt"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .github
  - .gitattributes
  - .gitignore
  - .gitmodules
  - CNAME
  - Dockerfile
  - README.md
  - LICENSE
  - debug.yml
  - docker-compose.yml
  - utilities
  - docs
  - .well-known/unsigned-security.txt
  - .well-known/unsigned-security.txt.asc
  - blog.code-workspace
  - tools
  - "**/*.ps1"
  - "**/*.sh"
